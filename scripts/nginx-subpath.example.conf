# Example: app served at https://host/grisc-sa/ while Next.js runs with NO basePath (root /).
# Use this when your reverse proxy strips the /grisc-sa prefix before proxy_pass (common on shared hosts).
#
# Install: adjust server_name and paths; include inside your server { } block.
#
# Why two locations:
# - /grisc-sa/  → rewrite to / so Next sees /, /saq, etc.
# - /_next/      → Next.js static chunks; browsers request these at site root /_next/...

location /grisc-sa/ {
    rewrite ^/grisc-sa/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location /_next/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}
