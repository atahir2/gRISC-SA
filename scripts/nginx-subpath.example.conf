# Next.js has basePath /grisc-sa in production — Node must receive paths like /grisc-sa/saq
# (do NOT strip /grisc-sa before proxy_pass).
#
# Example for https://mc-a4.lab.uvalight.net/grisc-sa/

location /grisc-sa/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Optional: redirect /grisc-sa → /grisc-sa/
location = /grisc-sa {
    return 301 /grisc-sa/;
}
