# Next.js with basePath /grisc-sa — build with NEXT_PUBLIC_BASE_PATH=/grisc-sa.
# Forward full URI to Node (no rewrite that strips /grisc-sa).

location ^~ /grisc-sa/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# Bare /grisc-sa (no path) does NOT match "location ^~ /grisc-sa/" — send users to the app entry.
location = /grisc-sa {
    return 301 /grisc-sa/saq;
}

# Optional: force landing on /saq instead of relying only on Next (same result).
location = /grisc-sa/ {
    return 301 /grisc-sa/saq;
}
